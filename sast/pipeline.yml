name: XGuardian SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xguardian-sast:
    name: XGuardian — SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Scan SAST
        uses: xguardian-actions/actions/sast@main
        with:
          token: ${{ secrets.XGUARDIAN_TOKEN }}
          app_name: "minha-app"
          team_id: "[1]"
          languages: '["Python"]'
          # scan_directory: "."   # padrão
          # exclude: "tests/,docs/"
          # translate: "false"
          # pdf: "false"
          # get_scan_id: "false"
