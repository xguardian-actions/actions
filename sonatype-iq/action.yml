name: XGuardian Sonatype IQ Ingest
description: "Envia resultados SCA do Sonatype IQ Server para a plataforma XGuardian via CycloneDX."
author: "Xmart Solutions"

branding:
  icon: "shield"
  color: purple

inputs:
  token:
    description: "PAT (Personal Access Token) gerado na plataforma XGuardian. Use secrets do GitHub."
    required: true
  report:
    description: "Caminho do arquivo CycloneDX JSON gerado pelo Sonatype IQ Server."
    required: true
  repository_name:
    description: "Nome do repositório/aplicação no XGuardian. Cria automaticamente se não existir."
    required: false
    default: ${{ github.event.repository.name }}
  branch:
    description: "Branch do repositório analisado."
    required: false
    default: ${{ github.ref_name }}
  triggered_by:
    description: "Username GitHub que acionou o scan (auto-reportado, não verificado pelo XGuardian)."
    required: false
    default: ${{ github.actor }}
  is_development:
    description: "Usar ambiente de desenvolvimento do XGuardian. Valores aceitos: true ou false"
    required: false
    default: "false"

outputs:
  app_id:
    description: "ID da aplicação criada ou atualizada no XGuardian."
    value: ${{ steps.expose-outputs.outputs.app_id }}
  scan_updated:
    description: "true se o scan foi atualizado com novos dados."
    value: ${{ steps.expose-outputs.outputs.scan_updated }}
  deduplicated:
    description: "true se a ingestão foi ignorada por ser idêntica à anterior."
    value: ${{ steps.expose-outputs.outputs.deduplicated }}

runs:
  using: "composite"
  steps:
    - name: Mascarar token
      shell: bash
      run: echo "::add-mask::${{ inputs.token }}"

    - name: Validar arquivo de relatório
      shell: bash
      env:
        REPORT_FILE: ${{ inputs.report }}
      run: |
        echo "::group::Validação do arquivo CycloneDX"

        if [ -z "${REPORT_FILE}" ]; then
          echo "::error::O input 'report' não pode ser vazio."
          echo "::endgroup::"
          exit 1
        fi

        if [ ! -f "${REPORT_FILE}" ]; then
          echo "::error::Arquivo não encontrado: ${REPORT_FILE}"
          echo "::endgroup::"
          exit 1
        fi

        # Validação de path traversal
        REPORT_REALPATH=$(realpath "${REPORT_FILE}")
        if [[ "${REPORT_REALPATH}" != "${GITHUB_WORKSPACE}"* ]]; then
          echo "::error::O arquivo deve estar dentro do workspace do runner."
          echo "::endgroup::"
          exit 1
        fi

        # Validação de tamanho (limite: 5 MB = 5242880 bytes)
        FILE_SIZE=$(wc -c < "${REPORT_FILE}")
        MAX_SIZE=5242880
        if [ "${FILE_SIZE}" -gt "${MAX_SIZE}" ]; then
          FILE_SIZE_HUMAN=$(du -h "${REPORT_FILE}" | cut -f1)
          echo "::error::Arquivo excede o limite de 5 MB. Tamanho atual: ${FILE_SIZE_HUMAN}"
          echo "::endgroup::"
          exit 1
        fi

        FILE_SIZE_HUMAN=$(du -h "${REPORT_FILE}" | cut -f1)
        echo "✅ Arquivo validado: ${REPORT_REALPATH}"
        echo "📦 Tamanho: ${FILE_SIZE_HUMAN}"
        echo "::endgroup::"

    - name: Definir URL do reporter
      shell: bash
      env:
        IS_DEVELOPMENT: ${{ inputs.is_development }}
      run: |
        if [[ "${IS_DEVELOPMENT}" == "true" ]]; then
          echo "REPORTER_URL=https://reporter.development.xguardianplatform.io" >> $GITHUB_ENV
          echo "Ambiente: desenvolvimento"
        else
          echo "REPORTER_URL=https://reporter.xguardianplatform.io" >> $GITHUB_ENV
          echo "Ambiente: produção"
        fi

    - name: Enviar relatório para o XGuardian
      id: ingest
      shell: bash
      env:
        XGUARDIAN_TOKEN: ${{ inputs.token }}
        REPORT_FILE: ${{ inputs.report }}
        REPOSITORY_NAME: ${{ inputs.repository_name }}
        BRANCH: ${{ inputs.branch }}
        TRIGGERED_BY: ${{ inputs.triggered_by }}
        REPORTER_URL: ${{ env.REPORTER_URL }}
      run: |
        echo "::group::Enviando CycloneDX para o XGuardian"
        echo "┌─────────────────────────────────────────────────────────┐"
        echo "│ XGuardian — Ingestão Sonatype IQ Server                 │"
        echo "└─────────────────────────────────────────────────────────┘"
        echo "  Repositório : ${REPOSITORY_NAME}"
        echo "  Branch      : ${BRANCH}"
        echo "  Acionado por: ${TRIGGERED_BY}"
        echo "  Arquivo     : ${REPORT_FILE}"
        echo "  URL         : ${REPORTER_URL}"

        HTTP_STATUS=$(curl -s \
          --max-time 30 \
          --connect-timeout 10 \
          -o /tmp/xg_ingest_response.json \
          -w "%{http_code}" \
          -X POST "${REPORTER_URL}/ingest/sonatype-iq" \
          -H "Authorization: Bearer ${XGUARDIAN_TOKEN}" \
          -F "repository_name=${REPOSITORY_NAME}" \
          -F "branch=${BRANCH}" \
          -F "triggered_by=${TRIGGERED_BY}" \
          -F "file=@${REPORT_FILE};type=application/json")

        echo "http_status=${HTTP_STATUS}" >> $GITHUB_OUTPUT
        echo "HTTP Status: ${HTTP_STATUS}"
        echo "::endgroup::"

    - name: Verificar resposta
      shell: bash
      env:
        HTTP_STATUS: ${{ steps.ingest.outputs.http_status }}
      run: |
        echo "::group::Resposta do servidor"
        cat /tmp/xg_ingest_response.json 2>/dev/null || echo "(sem corpo)"
        echo ""
        echo "::endgroup::"

        case "${HTTP_STATUS}" in
          202)
            echo "✅ Ingestão aceita com sucesso."
            ;;
          403)
            echo "::error::Token inválido, expirado ou sem permissão (HTTP 403). Verifique o secret XGUARDIAN_TOKEN e renove o PAT no painel XGuardian."
            exit 1
            ;;
          413)
            echo "::error::Arquivo excede o limite do servidor (HTTP 413). Reduza o tamanho do relatório CycloneDX."
            exit 1
            ;;
          422)
            echo "::error::Dados inválidos (HTTP 422). Verifique os campos repository_name e branch."
            exit 1
            ;;
          5*)
            echo "::error::Erro interno do servidor XGuardian (HTTP ${HTTP_STATUS}). Tente novamente em alguns minutos."
            exit 1
            ;;
          "")
            echo "::error::Sem resposta do servidor. Verifique a conectividade e o timeout."
            exit 1
            ;;
          *)
            echo "::error::Resposta inesperada do servidor (HTTP ${HTTP_STATUS})."
            exit 1
            ;;
        esac

    - name: Expor outputs
      id: expose-outputs
      shell: bash
      run: |
        APP_ID=$(jq -r '.app_id // ""' /tmp/xg_ingest_response.json 2>/dev/null)
        SCAN_UPDATED=$(jq -r '.scan_updated // "false"' /tmp/xg_ingest_response.json 2>/dev/null)
        DEDUPLICATED=$(jq -r '.deduplicated // "false"' /tmp/xg_ingest_response.json 2>/dev/null)

        echo "app_id=${APP_ID}" >> $GITHUB_OUTPUT
        echo "scan_updated=${SCAN_UPDATED}" >> $GITHUB_OUTPUT
        echo "deduplicated=${DEDUPLICATED}" >> $GITHUB_OUTPUT

        echo "┌─────────────────────────────────────────────────────────┐"
        echo "│ Resultado da Ingestão                                   │"
        echo "├─────────────────────────────────────────────────────────┤"
        echo "│ App ID       : ${APP_ID}"
        echo "│ Scan Updated : ${SCAN_UPDATED}"
        echo "│ Deduplicated : ${DEDUPLICATED}"
        echo "└─────────────────────────────────────────────────────────┘"
