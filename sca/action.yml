name: XGuardian SCA
description: "Análise de composição de software e dependências (SCA) para a plataforma XGuardian."
author: "Xmart Solutions"

branding:
  icon: "shield"
  color: purple

inputs:
  # ========================================================================================
  # CREDENCIAIS OBRIGATÓRIAS
  # ========================================================================================
  token:
    description: "PAT (Personal Access Token) gerado na plataforma XGuardian. Use secrets do GitHub."
    required: true

  # ========================================================================================
  # CONFIGURAÇÃO DA APLICAÇÃO
  # ========================================================================================
  app_name:
    description: "Nome da aplicação a ser escaneada."
    required: true
  team_id:
    description: "ID(s) da(s) equipe(s) no formato JSON. Ex: [1] ou [1,2,3]"
    default: "[1]"
    required: true
  languages:
    description: 'Linguagens de programação no formato JSON array. Ex: ["JavaScript"]'
    default: '["JavaScript"]'
    required: true
  description:
    description: "Descrição da aplicação no XGuardian."
    default: "Aplicação criada através do GitHub Actions - XGuardian"
    required: false
  policy_sca:
    description: "ID da política de SCA a ser aplicada. Use 0 para política padrão."
    default: "0"
    required: false

  # ========================================================================================
  # CONFIGURAÇÕES DO SCAN
  # ========================================================================================
  scan_directory:
    description: "Diretório a ser zipado para o scan. Use '.' para todo o repositório."
    default: "."
    required: false
  exclude:
    description: "Lista de diretórios ou arquivos a excluir. Ex: 'node_modules/,dist/'"
    default: ""
    required: false
  translate:
    description: "Traduz o relatório para português do Brasil. Valores: true ou false"
    default: "false"
    required: false
  pdf:
    description: "Gera relatório em PDF após o scan. Valores: true ou false"
    default: "false"
    required: false
  get_scan_id:
    description: "Busca o ID do scan após o upload. Valores: true ou false"
    default: "false"
    required: false
  triggered_by:
    description: "Username GitHub que acionou o scan (auto-reportado)."
    default: ${{ github.actor }}
    required: false
  is_development:
    description: "Usar ambiente de desenvolvimento. Valores: true ou false"
    default: "false"
    required: false

outputs:
  app_id:
    description: "ID da aplicação no XGuardian"
    value: ${{ steps.final_outputs.outputs.app_id }}
  scan_id:
    description: "ID do scan executado"
    value: ${{ steps.final_outputs.outputs.scan_id }}
  scan_url:
    description: "URL para visualizar os resultados do scan"
    value: ${{ steps.final_outputs.outputs.scan_url }}
  scan_version:
    description: "Versão do scan (app_name + SHA do commit)"
    value: ${{ format('{0}-{1}', inputs.app_name, steps.vars.outputs.short_sha) }}

runs:
  using: "composite"
  steps:
    - name: Definir URLs do XGuardian
      shell: bash
      run: |
        if [ "${{ inputs.is_development }}" == "true" ]; then
          echo "BASE_URL=https://shield.development.xguardianplatform.io" >> $GITHUB_ENV
          echo "UPLOADER_URL=https://uploader-mvp.development.xguardianplatform.io" >> $GITHUB_ENV
          echo "REPORTER_URL=https://reporter.development.xguardianplatform.io" >> $GITHUB_ENV
        else
          echo "BASE_URL=https://shield.xguardianplatform.io" >> $GITHUB_ENV
          echo "UPLOADER_URL=https://uploader-mvp.xguardianplatform.io" >> $GITHUB_ENV
          echo "REPORTER_URL=https://reporter.xguardianplatform.io" >> $GITHUB_ENV
        fi

    - name: Configurar token de autenticação
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.token }}"
        echo "API_TOKEN=${{ inputs.token }}" >> $GITHUB_ENV

    - name: Instalar dependências
      shell: bash
      run: |
        echo "::group::Instalação de dependências"
        sudo apt-get update -qq > /dev/null
        sudo apt-get install -y --no-install-recommends curl jq zip > /dev/null
        echo "✅ Dependências instaladas."
        echo "::endgroup::"

    - name: Verificar ou criar aplicação
      shell: bash
      env:
        UPLOADER_URL: ${{ env.UPLOADER_URL }}
        APP_NAME: ${{ inputs.app_name }}
        API_TOKEN: ${{ env.API_TOKEN }}
        TEAM_ID: ${{ inputs.team_id }}
        LANGUAGES: ${{ inputs.languages }}
        DESCRIPTION: ${{ inputs.description }}
      run: |
        echo "::group::Verificando aplicação"
        EXISTING_APP=$(curl -sS -X GET \
          "${UPLOADER_URL}/get_apps_new?page=1&items_per_page=10" \
          -H 'accept: application/json' \
          -H "Authorization: Bearer ${API_TOKEN}")

        APP_ID=$(echo "$EXISTING_APP" | jq -r --arg NAME "$APP_NAME" '.data[] | select(.name == $NAME) | .id' | head -n 1)

        if [ -n "$APP_ID" ]; then
          echo "✅ Aplicação encontrada: $APP_ID"
          echo "APP_ID=$APP_ID" >> $GITHUB_ENV
        else
          echo "Criando nova aplicação..."
          JSON_CONTENT='{"app_name": "'"${APP_NAME}"'","team_id": '"${TEAM_ID}"',"languages": '"${LANGUAGES}"',"description": "'"${DESCRIPTION}"'"}'
          RESPONSE=$(curl -sS -X POST "${UPLOADER_URL}/create_apps" \
            -H 'accept: application/json' \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "${JSON_CONTENT}")
          if echo "$RESPONSE" | grep -q '"sucess":"Aplicação\|"success":"Aplicação'; then
            echo "APP_ID=N/A" >> $GITHUB_ENV
          else
            echo "::error::Erro ao criar aplicação: $RESPONSE"
            exit 1
          fi
        fi
        echo "::endgroup::"

    - name: Obter short_sha
      id: vars
      shell: bash
      run: echo "short_sha=${GITHUB_SHA:0:6}" >> $GITHUB_OUTPUT

    - name: Criar scan SCA e obter URL de upload
      shell: bash
      env:
        UPLOADER_URL: ${{ env.UPLOADER_URL }}
        APP_ID: ${{ env.APP_ID }}
        SCAN_VERSION: ${{ format('{0}-{1}', inputs.app_name, steps.vars.outputs.short_sha) }}
        API_TOKEN: ${{ env.API_TOKEN }}
        TRANSLATE: ${{ inputs.translate }}
        EXCLUDE: ${{ inputs.exclude }}
        PDF: ${{ inputs.pdf }}
        TRIGGERED_BY: ${{ inputs.triggered_by }}
      run: |
        echo "::group::Preparando scan SCA"
        if [ "${APP_ID}" = "N/A" ]; then
          RESPONSE=$(curl -sS -X GET "${UPLOADER_URL}/get_apps_new?page=1&items_per_page=10" \
            -H 'accept: application/json' \
            -H "Authorization: Bearer ${API_TOKEN}")
          APP_ID=$(echo "$RESPONSE" | jq -r --arg NAME "${{ inputs.app_name }}" '.data[] | select(.name == $NAME) | .id' | head -n 1)
          echo "APP_ID=$APP_ID" >> $GITHUB_ENV
        fi

        DATA=$(cat << EOF
        {
          "app_id": ${APP_ID},
          "scan_version": "${SCAN_VERSION}",
          "file_type": "application/zip",
          "sca": "true",
          "sast": "false",
          "translate": "${TRANSLATE}",
          "exclude": "${EXCLUDE}",
          "pdf": "${PDF}",
          "triggered_by": "${TRIGGERED_BY}"
        }
        EOF
        )

        RESPONSE=$(curl -sS -X POST "${UPLOADER_URL}/upload-url" \
          -H 'accept: application/json' \
          -H 'Content-Type: application/json' \
          -H "Authorization: Bearer ${API_TOKEN}" \
          -d "${DATA}")

        GET_UPLOAD_URL=$(echo "${RESPONSE}" | jq -r '.url')
        if [ -z "$GET_UPLOAD_URL" ] || [ "$GET_UPLOAD_URL" = "null" ]; then
          echo "::error::Não foi possível obter a URL de upload."
          exit 1
        fi
        echo "GET_UPLOAD_URL=${GET_UPLOAD_URL}" >> $GITHUB_ENV
        echo "✅ URL de upload obtida."
        echo "::endgroup::"

    - name: Zipar os arquivos
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        SCAN_DIR: ${{ inputs.scan_directory }}
      run: |
        echo "::group::Criando arquivo ZIP"
        SAFE_APP_NAME=$(echo "${APP_NAME}" | tr '/' '_')
        echo "SAFE_APP_NAME=${SAFE_APP_NAME}" >> $GITHUB_ENV
        if [ "$SCAN_DIR" = "." ]; then
          zip -rq "${SAFE_APP_NAME}.zip" . -x "*.git/*" "*/node_modules/*" "*.env" "*.zip"
        else
          zip -rq "${SAFE_APP_NAME}.zip" "$SCAN_DIR" -x "*.git/*" "*/node_modules/*" "*.env" "*.zip"
        fi
        echo "✅ ZIP criado: ${SAFE_APP_NAME}.zip ($(du -h "${SAFE_APP_NAME}.zip" | cut -f1))"
        echo "::endgroup::"

    - name: Upload para o XGuardian
      shell: bash
      env:
        SAFE_APP_NAME: ${{ env.SAFE_APP_NAME }}
        GET_UPLOAD_URL: ${{ env.GET_UPLOAD_URL }}
      run: |
        echo "::group::Upload do arquivo ZIP"
        curl -# --fail --location --request PUT "${GET_UPLOAD_URL}" \
          --header 'Content-Type: application/zip' \
          --data-binary "@./${SAFE_APP_NAME}.zip"
        echo "✅ Upload concluído."
        echo "::endgroup::"

    - name: Aguardar e buscar ID do scan
      shell: bash
      if: ${{ inputs.get_scan_id == 'true' }}
      env:
        REPORTER_URL: ${{ env.REPORTER_URL }}
        BASE_URL: ${{ env.BASE_URL }}
        APP_ID: ${{ env.APP_ID }}
        API_TOKEN: ${{ env.API_TOKEN }}
        SCAN_VERSION: ${{ format('{0}-{1}', inputs.app_name, steps.vars.outputs.short_sha) }}
      run: |
        echo "::group::Buscando ID do scan"
        sleep 30
        for i in {1..30}; do
          RESPONSE=$(curl -sS -X GET "${REPORTER_URL}/get_scan_pagination/${APP_ID}?page=1&items_per_page=10" \
            -H 'accept: application/json' \
            -H "Authorization: Bearer ${API_TOKEN}")
          SCAN_DATA=$(echo "$RESPONSE" | jq -r --arg v "$SCAN_VERSION" '.data[] | select(.scanuuid == $v)')
          if [ -n "$SCAN_DATA" ]; then
            SCAN_ID=$(echo "$SCAN_DATA" | jq -r '.id')
            echo "APP_ID=${APP_ID}" >> $GITHUB_ENV
            echo "SCAN_ID=${SCAN_ID}" >> $GITHUB_ENV
            echo "SCAN_URL=${BASE_URL}/aplicacoes/${APP_ID}/scans" >> $GITHUB_ENV
            echo "${APP_ID}:${SCAN_ID}" > /tmp/xguardian_scan_complete
            echo "✅ Scan encontrado: $SCAN_ID"
            break
          fi
          sleep 10
        done
        echo "::endgroup::"

    - name: Finalizar outputs
      id: final_outputs
      shell: bash
      if: ${{ inputs.get_scan_id == 'true' }}
      env:
        BASE_URL: ${{ env.BASE_URL }}
      run: |
        IFS=':' read -r app_id scan_id < /tmp/xguardian_scan_complete
        echo "app_id=$app_id" >> "$GITHUB_OUTPUT"
        echo "scan_id=$scan_id" >> "$GITHUB_OUTPUT"
        echo "scan_url=${BASE_URL}/aplicacoes/$app_id/scans" >> "$GITHUB_OUTPUT"

    - name: Resumo da execução
      shell: bash
      if: always()
      env:
        APP_ID: ${{ env.APP_ID }}
        SCAN_ID: ${{ env.SCAN_ID }}
        SCAN_URL: ${{ env.SCAN_URL }}
        APP_NAME: ${{ inputs.app_name }}
      run: |
        echo "┌─────────────────────────────────────────────────────────┐"
        echo "│ XGuardian SCA — Resumo                                  │"
        echo "├─────────────────────────────────────────────────────────┤"
        echo "│ Aplicação : ${APP_NAME}"
        echo "│ App ID    : ${APP_ID:-Não disponível}"
        echo "│ Scan ID   : ${SCAN_ID:-Não disponível}"
        [ -n "${SCAN_URL}" ] && echo "│ URL       : ${SCAN_URL}"
        echo "└─────────────────────────────────────────────────────────┘"
